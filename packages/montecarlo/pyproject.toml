[project]
name = "montecarlo"
version = "0.1.0"
description = "Monte Carlo simulation engine for trading strategy validation"
requires-python = ">=3.10"
dependencies = [
    "numpy>=2.0.0",
    "scipy>=1.10",
    "polars>=1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
