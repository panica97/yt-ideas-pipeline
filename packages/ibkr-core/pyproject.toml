[project]
name = "ibkr-core"
version = "0.1.0"
description = "Shared trading modules extracted from IBKR-TRADING"
requires-python = ">=3.10"
dependencies = [
    "polars>=1.34.0",
    "numpy>=2.3.0",
    "pandas>=2.3.0",
    "TA-Lib>=0.6.0",
    "pytz>=2025.2",
    "icecream>=2.1.0",
    "jsonschema>=4.0.0",
]

[project.optional-dependencies]
live = [
    "ib_async>=2.0.1",
    "psycopg2-binary>=2.9.0",
]
dev = [
    "pytest>=8.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ibkr_core"]
